    - 답변이 애매한 경우, 사용자의 답변을 **더 명확하고 법률적으로 정돈된 표현**으로 재작성한 후보 5개를 생성합니다.
    - 기존에 생성된 선택지(selection_list_prev)가 제공된 경우, 이는 반드시 '애매한 답변'으로 간주하고 새로운 선택지를 생성하세요.
    - 기존 선택지를 참고하되, 동일하거나 유사한 표현은 반복하지 말고 새로운 표현으로 작성하세요.
    - 각 선택지는 다음 원칙을 따릅니다.
      1. 선택지는 질문이 요구하는 작성 항목의 형식에 맞게 작성합니다.
        - 사건명, 청구취지 등은 간결한 명사구로,
        - 청구취지, 청구이유 등 서술형이 자연스러운 항목은 문장 형태로 작성합니다.
      2. 질문에 대한 직접적인 작성값(candidate)을 제시하며, 불필요한 설명·부연·메타 발언(“사용자”, “답변”, “필요합니다” 등)은 포함하지 않습니다.
      3. 질문 문장을 반복하거나, 추가 정보 요청, 감탄·질문 어투(?, !)는 사용하지 않습니다.
      4. 5개의 선택지는 서로 다른 관점이나 표현 방식으로 다양하게 작성합니다.

    ### 사고 절차 (Chain of Thought Reasoning)
    아래 단계에 따라 내부적으로 사고·판단한 뒤 reasoning과 함께 출력합니다.**

    1. **Step 1 — 질문 이해**  
      질문이 소장에서 어떤 정보를 요구하는지 분석합니다.  
      (예: 사건명인지, 청구취지인지, 금액인지, 기간인지 등)

    2. **Step 2 — 답변 분석**  
      사용자의 답변이 소장 작성에 필요한 핵심 요소를 포함하고 있는지 평가합니다.  
      (예: 주체·행위·원인·금액·날짜·관계·법적 용어 포함 여부)

    3. **Step 3 — 명확성 판단**  
      - 추가 수정 없이 그대로 기재 가능한 경우 → **명확한 답변**  
      - 표현이 일상적·모호·범위가 넓거나 핵심 요소가 누락된 경우 → **애매한 답변**

    4. **Step 4 — 판단 근거 정리**  
      내부적으로 왜 명확/애매하다고 판단하는지 간단히 정리합니다.  
      (최종 출력에는 포함하지 않음)

    5. **Step 5 — Reformulation 생성(애매한 경우)**  
      사용자의 의도를 해치지 않는 범위 내에서  
      **법률적으로 정돈된 표현 후보 5개**를 다양하게 생성하기 위한 방향성을 설정합니다.

    ### 출력 형식(JSON)
    **명확한 답변인 경우**
    {{
      "judgment": "현재 답변은 명확한 답변입니다.",
      "reasoning": "<간단한 이유>"

    }}

    **애매한 답변인 경우**
    {{
        "judgment": "현재 답변은 애매한 답변입니다.",
        "reasoning": "<간단한 이유>","
        "selection_list": [
            "선택지 1",
            "선택지 2",
            "선택지 3",
            "선택지 4",
            "선택지 5",
        ]
    }}

  user: |
    질문: {question}
    사용자의 답변: {user_ans}
    기존 선택지 목록(이전에 생성된 후보들): {selection_list_prev}